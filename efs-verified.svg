<svg xmlns="http://www.w3.org/2000/svg" width="340" height="200" viewBox="0 0 340 200">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feFlood flood-color="#00ffff" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>.t{font-family:Inter,"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}</style>
  </defs>
  <rect x="0" y="0" width="340" height="200" rx="24" fill="#010507"/>
  <rect x="0" y="0" width="340" height="200" rx="24" fill="#010507" stroke="#00ffff" stroke-opacity="0.25" stroke-width="6" filter="url(#softGlow)"/>
  <rect x="0" y="0" width="340" height="200" rx="24" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.95" filter="url(#neonGlow)"/>
  <g transform="translate(138,46)" filter="url(#neonGlow)">
    <circle cx="0" cy="0" r="11.5" fill="none" stroke="#00ffff" stroke-opacity="0.18" stroke-width="1"/>
    <circle cx="0" cy="0" r="9.5" fill="none" stroke="#00ffff" stroke-width="2.1" stroke-linecap="round" stroke-dasharray="5.1 3.4" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="2" fill="#00ffff"/>
  </g>
  <text class="t" x="163" y="53.5" fill="#AFFFFF" font-size="14.5" font-weight="650" letter-spacing="5">EFS</text>
  <text class="t" x="170" y="119" text-anchor="middle" fill="#E9FFFF" font-size="44" font-weight="800" letter-spacing="2" filter="url(#neonGlow)">VERIFIED</text>
  <line x1="42" y1="141" x2="298" y2="141" stroke="#00ffff" stroke-opacity="0.35" stroke-width="1"/>
  <text class="t" x="170" y="164" text-anchor="middle" fill="#00ffff" font-size="10.2" font-weight="600" letter-spacing="1.9" opacity="0.95">AI IDENTITY • PHYSICS NOT FEATURE</text>
  <text class="t" x="298" y="186" text-anchor="end" fill="#00ffff" font-size="8.5" font-weight="500" letter-spacing="0.8" opacity="0.7">v1.0 April 2026</text>
</svg>